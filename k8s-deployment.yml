apiVersion: apps/v1
kind: Deployment

metadata:
  name: simple-webapp-deployment
  labels:
    app: simple-webapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: simple-webapp

  template:
    metadata:
      labels:
        app: simple-webapp

    spec:
      containers:
      - name: simple-webapp

        image: dushyantsharmma/fistpipeline:v1.0

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: simple-webapp-service

spec:
  type: NodePort

  selector:
    app: simple-webapp

  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30007
